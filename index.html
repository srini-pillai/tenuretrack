function lsLoad() {

async function paSave(payload) {
  if (!POWER_AUTOMATE_URL) throw new Error("POWER_AUTOMATE_URL not configured");
  await fetch(POWER_AUTOMATE_URL, {
    method:"POST", headers:{"Content-Type":"application/json"},
    body:JSON.stringify(payload), mode:"no-cors"
  });
}
async function paLoad() {
  // Re-read from localStorage at call time (module-level var may be stale)
  const url = localStorage.getItem("pa_load_url") || PA_LOAD_URL;
  if (!url) throw new Error("PA_LOAD_URL not configured");
  // Temporarily update module var
  PA_LOAD_URL = url;
  const res = await fetch(url, {
    method:"POST", headers:{"Content-Type":"application/json"},
    body:JSON.stringify({action:"read"})
  });
  if (!res.ok) {
    const errText = await res.text().catch(()=>"");
    throw new Error("PA load "+res.status+": "+errText.slice(0,200));
  }
  // PA sometimes wraps response in {"$content":"base64..."} or returns raw string
  const text = await res.text();
  try {
    const parsed = JSON.parse(text);
    // Handle PA binary wrapper: {"$content-type":..., "$content":"base64..."}
    if (parsed["$content"]) {
      const decoded = atob(parsed["$content"]);
      return JSON.parse(decoded);
    }
    // Handle PA wrapping in {"body": {...}} or {"value": {...}}
    if (parsed.body && parsed.body.rows) return parsed.body;
    if (parsed.value && parsed.value.rows) return parsed.value;
    return parsed;
  } catch(e) {
    throw new Error("PA load parse error: "+e.message+" response: "+text.slice(0,200));
  };
  return res.json();
}

  try {

      rowCount: rows.length,
      rows,
      portfolioLeads: lsPortfolioLoad(),
      exemptCategories: lsExemptCatLoad(),
      extra: extraData
    };
    // Try Graph first, then SP REST, then PA, then FSA
    let saved = false;
    try { await graphUploadFile("tenure_data.json", payload); saved=true; } catch(e){}
    if(!saved){ try { await spRESTSave(payload); saved=true; } catch(e){} }
    if(!saved && POWER_AUTOMATE_URL){

        await fetch(POWER_AUTOMATE_URL,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify(payload),mode:"no-cors"});

      } catch(e){}
    }
    if(!saved && _fsaFileHandle){
      try { await fsaWriteHandle(_fsaFileHandle,payload); saved=true; } catch(e){}
    }
    if(saved && onDone) onDone();
    else if(!saved && onErr) onErr("Could not reach SharePoint — changes saved locally only");
  } catch(e) {
    console.warn("saveExtraToSP failed:",e.message);
    if(onErr) onErr(e.message);
  }
}

function isCacheStale() {
  // Returns true if localStorage was saved before the current DATA_VERSION,
  // ensuring every new HTML deployment automatically invalidates stale caches.
  try {
    const meta = JSON.parse(localStorage.getItem(LS_META_KEY) || "{}");
    if (!meta.savedAt) return true;
    return new Date(meta.savedAt) < new Date(DATA_VERSION);
  } catch { return true; }
}

    const rows=(data.rows||[]).map(r=>({
      ...r,
      "Total FTE": (r["Total FTE"]!==undefined&&r["Total FTE"]!==null&&r["Total FTE"]!=="")

    }));

      if(data.portfolioLeads&&data.portfolioLeads.length) lsPortfolioSave(data.portfolioLeads);
      if(data.exemptCategories&&data.exemptCategories.length) lsExemptCatSave(data.exemptCategories);
      if(data.extra&&Object.keys(data.extra).length) lsExtraSave(data.extra);
      onProgress("Loaded from SharePoint",100);
      return rows;
    }

  if(isCacheStale()) {
    if(EMBEDDED_DATA&&EMBEDDED_DATA.length){
      lsSave(EMBEDDED_DATA);
      onProgress("Refreshed from embedded data",100);
      return EMBEDDED_DATA;

  // Cache is current — use it
  const cached=lsLoad();
  if(cached&&cached.rows.length){
    onProgress("SharePoint unavailable — using local cache",100);
    return cached.rows;
  }
  // Absolute fallback
  if(EMBEDDED_DATA&&EMBEDDED_DATA.length){
    lsSave(EMBEDDED_DATA);
    onProgress("Loaded from embedded data",100);
    return EMBEDDED_DATA;

  throw new Error("No data available. Use the Load button to upload tenure_data.json.");

function parseCSV(text) {
  const lines=text.trim().split(/\r?\n/); if(!lines.length)return[];
  const headers=lines[0].split(",").map(h=>h.trim().replace(/^"|"$/g,""));
  return lines.slice(1).map(line=>{
    const vals=[];let cur="",inQ=false;
    for(let i=0;i<line.length;i++){if(line[i]==='"'){inQ=!inQ;continue;}if(line[i]===","&&!inQ){vals.push(cur.trim());cur="";}else cur+=line[i];}
    vals.push(cur.trim());const obj={};headers.forEach((h,i)=>{obj[h]=vals[i]??"";});return obj;
  });
}

function fuzzyKey(row,candidates){

}
function parseMonthValue(raw){

  const m2=s.match(/^(\d{1,2})[\/\-](\d{4})$/);if(m2)return new Date(Number(m2[2]),Number(m2[1])-1,1);

}
function parseMonthNumber(mr,yr){const m=parseInt(String(mr).trim(),10);if(isNaN(m)||m<1||m>12)return null;const y=yr?parseInt(String(yr).trim(),10):NaN;return new Date(!isNaN(y)&&y>2000&&y<2100?y:2025,m-1,1);}
function detectIdKey(rows){
  if(!rows.length)return null;const first=rows[0];
  const named=fuzzyKey(first,["Associate ID","AssociateID","Associateid","associate_id","Assoc ID","AssocID","EmpID","Emp ID","Employee ID","EmployeeID","emp_id"]);
  if(named)return named;
  const sample=rows.slice(0,50).filter(r=>Object.values(r).some(v=>String(v).trim()));
  for(const key of Object.keys(first)){const vals=sample.map(r=>String(r[key]??"").trim()).filter(Boolean);if(vals.length<3)continue;if(vals.filter(v=>/^\d{4,8}$/.test(v)).length/vals.length>=0.6)return key;}
  return Object.keys(first)[0]||null;
}
function detectMonthKey(rows,idKey){
  if(!rows.length)return null;const first=rows[0];
  const named=fuzzyKey(first,["Month","month","Month Name","MonthName","Period","Billing Month","BillingMonth","Date","date"]);
  if(named)return named;

  for(const key of Object.keys(first).filter(k=>k!==idKey)){

    const mc=vals.filter(v=>{const n=parseInt(v,10);return(!isNaN(n)&&n>=1&&n<=12&&v.length<=2)||!!parseMonthValue(v);}).length;
    if(mc/vals.length>=0.6)return key;

function buildUtilLookup(utilRows){
  const result={idKey:null,monthKey:null,yearKey:null,map:new Map(),sampleRawId:null,sampleRawMonth:null,sampleRawYear:null,sampleParsed:null,usingMonthNumber:false,allKeys:[]};
  if(!utilRows.length)return result;
  result.allKeys=Object.keys(utilRows[0]);result.idKey=detectIdKey(utilRows);const exactMonthKey=Object.keys(utilRows[0]).find(k=>k.trim()==="Month")||null;result.monthKey=exactMonthKey||detectMonthKey(utilRows,result.idKey);
  const exactYearKey=Object.keys(utilRows[0]).find(k=>k.trim()==="Year")||null;result.yearKey=exactYearKey||fuzzyKey(utilRows[0],["Year","year","Year Of Joining","YearOfJoining","Fiscal Year","FiscalYear","fiscal_year","YEAR"]);
  const fwi=utilRows.find(r=>result.idKey&&String(r[result.idKey]??"").trim());result.sampleRawId=fwi?String(fwi[result.idKey]):null;
  const fwm=utilRows.find(r=>result.monthKey&&String(r[result.monthKey]??"").trim());result.sampleRawMonth=fwm?String(fwm[result.monthKey]):null;
  result.sampleRawYear=(result.yearKey&&fwm)?String(fwm[result.yearKey]):null;
  if(!result.idKey||!result.monthKey)return result;
  const sn=result.sampleRawMonth?parseInt(result.sampleRawMonth.trim(),10):NaN;
  result.usingMonthNumber=!isNaN(sn)&&sn>=1&&sn<=12&&(result.sampleRawMonth||"").trim().length<=2;
  result.sampleParsed=result.usingMonthNumber?parseMonthNumber(result.sampleRawMonth,result.sampleRawYear):(result.sampleRawMonth?parseMonthValue(result.sampleRawMonth):null);
  for(const row of utilRows){
    const rawId=row[result.idKey];if(!rawId||String(rawId).trim()==="")continue;

function DonutChart({segments,size=120}){
  const total=segments.reduce((s,x)=>s+x.value,0);
  if(!total)return<div style={{width:size,height:size,display:"flex",alignItems:"center",justifyContent:"center",color:"#475569",fontSize:13}}>No data</div>;
  let cum=0;const r=45,cx=60,cy=60;
  const paths=segments.map(seg=>{const sa=(cum/total)*2*Math.PI-Math.PI/2;cum+=seg.value;const ea=(cum/total)*2*Math.PI-Math.PI/2;const x1=cx+r*Math.cos(sa),y1=cy+r*Math.sin(sa),x2=cx+r*Math.cos(ea),y2=cy+r*Math.sin(ea);return{...seg,d:`M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${ea-sa>Math.PI?1:0},1 ${x2},${y2} Z`};});
  return(<svg width={size} height={size} viewBox="0 0 120 120">{paths.map((p,i)=><path key={i} d={p.d} fill={p.color} opacity="0.9"/>)}<circle cx={cx} cy={cy} r={28} fill="#0f172a"/><text x={cx} y={cy+5} textAnchor="middle" fill="#f8fafc" fontSize="14" fontWeight="700">{total}</text></svg>);
}

function ExemptedTillInput({storedVal, onCommit, inputStyle, wrapStyle}){
  const display = formatExemptedTill(storedVal||"");
  const [draft,   setDraft]   = useState(display);
  const [err,     setErr]     = useState("");
  const [showPicker, setShowPicker] = useState(false);
  const wrapRef = React.useRef(null);

  // Sync when storedVal changes externally
  React.useEffect(()=>{
    setDraft(formatExemptedTill(storedVal||""));
    setErr("");
  },[storedVal]);

  // Close picker on outside click
  React.useEffect(()=>{
    if(!showPicker) return;
    const handler = e => {
      if(wrapRef.current && !wrapRef.current.contains(e.target)) setShowPicker(false);
    };
    document.addEventListener("mousedown", handler);
    return ()=>document.removeEventListener("mousedown", handler);
  },[showPicker]);

  // Convert MM/YY → YYYY-MM for the month picker
  const toPickerVal = ()=>{
    const m = display.match(/^(\d{1,2})\/(\d{2})$/);
    if(!m) return "";
    const month = m[1].padStart(2,"0");
    const year  = "20"+m[2];
    return year+"-"+month;
  };

  const handleTextBlur = ()=>{
    const v = draft.trim();
    if(!v){ onCommit(""); setErr(""); return; }
    if(isValidMMYY(v)){ onCommit(v); setErr(""); }
    else{ setErr("Use MM/YY format (e.g. 7/26)"); setDraft(display); }
  };

  const handlePickerChange = e=>{
    const val = e.target.value; // "YYYY-MM"
    if(!val){ onCommit(""); setDraft(""); setShowPicker(false); return; }
    const [y,m] = val.split("-");
    const mmyy  = parseInt(m,10)+"/"+y.slice(2);
    onCommit(mmyy);
    setDraft(mmyy);
    setErr("");
    setShowPicker(false);
  };

  return(
    <div ref={wrapRef} style={{position:"relative",display:"inline-flex",alignItems:"center",gap:3,...(wrapStyle||{})}}>
      <input
        value={draft}
        onChange={e=>{setDraft(e.target.value);setErr("");}}
        onBlur={handleTextBlur}
        onFocus={()=>setShowPicker(true)}
        placeholder="MM/YY"
        maxLength={10}
        style={{...inputStyle,borderColor:err?"#f87171":undefined}}
      />
      <button
        type="button"
        onMouseDown={e=>{e.preventDefault();setShowPicker(p=>!p);}}
        title="Pick month"
        style={{flexShrink:0,width:20,height:20,padding:0,border:"1px solid #334155",
          borderRadius:4,background:"#1e293b",color:"#64748b",cursor:"pointer",
          display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,lineHeight:1}}>
        &#128197;
      </button>
      {err&&<div style={{position:"absolute",top:"100%",left:0,zIndex:30,marginTop:3,
        padding:"4px 8px",background:"#7f1d1d",border:"1px solid #dc2626",borderRadius:5,
        color:"#fca5a5",fontSize:10,whiteSpace:"nowrap",pointerEvents:"none"}}>{err}</div>}
      {showPicker&&(
        <div style={{position:"absolute",top:"100%",left:0,zIndex:30,marginTop:4,
          background:"#1e293b",border:"1px solid #334155",borderRadius:8,
          padding:"12px 14px",boxShadow:"0 8px 24px rgba(0,0,0,0.6)"}}>
          <div style={{color:"#94a3b8",fontSize:10,fontWeight:700,textTransform:"uppercase",
            letterSpacing:"0.06em",marginBottom:8}}>Select Month</div>
          <input
            type="month"
            value={toPickerVal()}
            onChange={handlePickerChange}
            style={{background:"#0f172a",border:"1px solid #334155",borderRadius:6,
              color:"#e2e8f0",fontSize:13,padding:"6px 10px",outline:"none",
              colorScheme:"dark"}}
          />
          <div style={{marginTop:8,display:"flex",justifyContent:"flex-end"}}>
            <button onMouseDown={e=>{e.preventDefault();setShowPicker(false);}}
              style={{fontSize:11,color:"#64748b",background:"transparent",border:"none",
                cursor:"pointer",padding:"2px 6px"}}>Cancel</button>
          </div>
        </div>
      )}
    </div>
  );
}

      <div style={{overflowY:"auto",overflowX:"auto",flex:1}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,minWidth:1400}}>
          <thead style={{position:"sticky",top:0,zIndex:1}}>
            <tr style={{background:"#1e293b"}}>
              {COLS.map(c=>(<th key={c} style={{padding:"9px 10px",textAlign:"left",
                color:EDITABLE.includes(c)?"#38bdf8":c==="Projects"?"#a78bfa":"#94a3b8",
                fontWeight:700,fontSize:10,textTransform:"uppercase",letterSpacing:"0.06em",
                borderBottom:"1px solid #334155",whiteSpace:"nowrap"}}>
                {c}{EDITABLE.includes(c)&&<span style={{color:"#38bdf855",marginLeft:4,fontSize:9}}>&#9998;</span>}
              </th>))}
            </tr>
          </thead>
          <tbody>
            {filtered.map((row,i)=>{
              const id=String(row["Associate ID"]??"").trim();
              const isDirty=dirty[id];
              return(<tr key={id||i} style={{background:isDirty?"#0f1e2e":i%2===0?"#0a1628":"#0f172a",
                borderBottom:"1px solid #1e293b",outline:isDirty?"1px solid #38bdf822":"none"}}>
                {COLS.map(c=>(<td key={c} style={{padding:"7px 8px",
                  whiteSpace:c==="Projects"?"normal":"nowrap",
                  maxWidth:c==="Projects"?260:EDITABLE.includes(c)?160:180,
                  overflow:"hidden",textOverflow:c==="Projects"?"unset":"ellipsis",
                  verticalAlign:"top"}}>
                  {renderCell(row,c)}
                </td>))}
              </tr>);
            })}
            {!filtered.length&&<tr><td colSpan={COLS.length} style={{padding:24,textAlign:"center",color:"#475569"}}>No matching records</td></tr>}
          </tbody>
        </table>
      </div>
      {Object.keys(dirty).length>0&&(
        <div style={{padding:"12px 24px",borderTop:"1px solid #1e293b",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,background:"#080f1f"}}>
          <span style={{color:"#64748b",fontSize:12}}>{Object.keys(dirty).length+" associate(s) with unsaved changes"}</span>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>{setLocalExtra(lsExtraLoad());setDirty({});setSaved(false);}} style={{padding:"7px 16px",borderRadius:7,background:"#1e293b",color:"#94a3b8",fontWeight:700,fontSize:12,border:"1px solid #334155",cursor:"pointer"}}>Discard</button>
            <button onClick={handleSave} disabled={saving} style={{padding:"7px 18px",borderRadius:7,background:saving?"#0369a1":"#0ea5e9",color:"#fff",fontWeight:700,fontSize:12,border:"none",cursor:saving?"wait":"pointer"}}>{saving?"Saving...":"Save Changes"}</button>
          </div>
        </div>
      )}
    </div>
  </div>);
}




// ── Tenure Status Drilldown Modal ────────────────────────────────────────────
function AtRiskDrilldown({title,associates,onClose}){
  const [viewBy,setViewBy]=useState("practice");
  const [assocDialog,setAssocDialog]=useState(null);
  const fteSum=rows=>new Set(rows.map(r=>String(r["Associate ID"]??"").trim()).filter(Boolean)).size;
  const extra=lsExtraLoad();
  const exemptCats=lsExemptCatLoad();
  const accent=title.includes("> 12")?"#f87171":"#fb923c";

  // Enrich with extra cols
  const enriched=useMemo(()=>associates.map(r=>{
    const id=String(r["Associate ID"]??"").trim();
    const ex=extra[id]||{};
    return{...r,"Exempted Category":ex["Exempted Category"]||""};
  }),[associates,extra]);

  // All exemption categories present in this dataset
  const allCats=useMemo(()=>{
    const raw=[...exemptCats,...enriched.map(r=>r["Exempted Category"]).filter(Boolean)];
    const m={};raw.forEach(c=>{const k=c.toLowerCase();if(!m[k])m[k]=c;});
    return Object.values(m).sort();
  },[enriched,exemptCats]);

  // ── Practice Area tab ────────────────────────────────────────────────────
  // Rows: Practice Area (merged) × FTE_CON; Columns: Exempted Category + No Category + Total
  const practiceGroups=useMemo(()=>{
    const g={};
    enriched.forEach(r=>{
      const pa=r["Practice Area"]||"Unspecified";
      const fte=r["FTE_CON"]||"FTE";
      if(!g[pa])g[pa]={label:pa,fteRows:{}};
      if(!g[pa].fteRows[fte])g[pa].fteRows[fte]=[];
      g[pa].fteRows[fte].push(r);
    });
    return Object.values(g).sort((a,b)=>{
      const aTotal=fteSum(Object.values(a.fteRows).flat());
      const bTotal=fteSum(Object.values(b.fteRows).flat());
      return bTotal-aTotal;

  },[enriched]);

  // ── Project Billability tab ──────────────────────────────────────────────

      if(!g[bill].fteRows[fte])g[bill].fteRows[fte]=[];
      g[bill].fteRows[fte].push(r);

    return Object.values(g).sort((a,b)=>{

      <div style={{background:"#0f172a",border:"1px solid #334155",borderRadius:14,width:"100%",maxWidth:1300,maxHeight:"92vh",display:"flex",flexDirection:"column",overflow:"hidden"}} onClick={e=>e.stopPropagation()}>

        {/* Header */}

function TenureStatusDrilldown({exemptCategory, associates, onClose}) {
  const [viewBy, setViewBy] = useState("practice");
  const [assocDialog, setAssocDialog] = useState(null);

  // Helper: FTE count per unique associate; uses real Total FTE if present, else headcount
  const fteSum=rows=>{
    const ids=new Set(rows.map(r=>String(r["Associate ID"]??"").trim()).filter(Boolean));
    return ids.size;
  };

  // Merge extra cols into associates
  const extra = lsExtraLoad();
  const plLeads = lsPortfolioLoad();
  const plMap = Object.fromEntries(plLeads.filter(l=>l.id).map(l=>[l.id, l.name ? l.name+" ("+l.id+")" : l.id]));
  const enriched = associates.map(r => {
    const id = String(r["Associate ID"] ?? "").trim();
    const ex = extra[id] || {};
    const et = ex["Exempted Till"] || "";
    const plId = ex["Portfolio Lead"] || "";
    return {
      ...r,
      "Portfolio Lead": plId ? (plMap[plId] || plId) : "",
      "Exempted Category": ex["Exempted Category"] || "",
      "Exempted Till": et,
      "Revised Tenure": et ? deriveRevisedTenure(et, r.Tenure) : (ex["Revised Tenure"] || ""),
      "Email Approval": ex["Email Approval"] || ""
    };
  });

  // Get unique onsite values as columns
  const onsiteVals = [...new Set(enriched.map(r => r["Is Onsite"] || "Unknown"))].sort();

  // Build row groups based on viewBy
  const rowGroups = useMemo(() => {
    if (viewBy === "practice") {
      const groups = {};
      enriched.forEach(r => {
        const key = r["Practice Area"] || "Unspecified";
        if (!groups[key]) groups[key] = { label: key, rows: [] };
        groups[key].rows.push(r);
      });
      return Object.values(groups).sort((a,b) => b.rows.length - a.rows.length);
    } else {
      const groups = {};
      enriched.forEach(r => {
        const pid = r["Project Id"] || "";
        const pname = r["Project Name"] || "Unknown";
        const key = pid + "||" + pname;
        if (!groups[key]) groups[key] = { id: pid, name: pname, label: pname, rows: [] };
        groups[key].rows.push(r);
      });
      return Object.values(groups).sort((a,b) => b.rows.length - a.rows.length);
    }
  }, [enriched, viewBy]);

  const totalByOnsite = onsiteVals.reduce((acc, ov) => {
    acc[ov] = fteSum(enriched.filter(r => (r["Is Onsite"] || "Unknown") === ov));
    return acc;
  }, {});

  return (
    <div style={{position:"fixed",inset:0,zIndex:1100,background:"rgba(0,0,0,0.8)",display:"flex",alignItems:"center",justifyContent:"center",padding:24}} onClick={onClose}>
      <div style={{background:"#0f172a",border:"1px solid #334155",borderRadius:14,width:"100%",maxWidth:1200,maxHeight:"90vh",display:"flex",flexDirection:"column",overflow:"hidden"}} onClick={e=>e.stopPropagation()}>
        {/* Header */}
        <div style={{padding:"18px 24px",borderBottom:"1px solid #1e293b",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
          <div>
            <div style={{color:"#f8fafc",fontWeight:800,fontSize:17}}>{exemptCategory || "No Category Assigned"}</div>
            <div style={{color:"#64748b",fontSize:12,marginTop:2}}>FTE Count: {fteSum(enriched)} (Headcount: {associates.length}) — click any count to view details</div>
          </div>
          <button onClick={onClose} style={{width:32,height:32,borderRadius:8,border:"1px solid #334155",background:"#1e293b",color:"#94a3b8",cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>x</button>
        </div>
        {/* Toggle */}
        <div style={{padding:"14px 24px",borderBottom:"1px solid #1e293b",display:"flex",gap:8,flexShrink:0}}>
          <span style={{color:"#64748b",fontSize:12,alignSelf:"center",marginRight:6}}>Group by:</span>
          {[["practice","Practice Area"],["project","Project Name"]].map(([val,label]) => (
            <button key={val} onClick={()=>setViewBy(val)} style={{padding:"6px 16px",borderRadius:7,fontSize:12,fontWeight:700,cursor:"pointer",
              background:viewBy===val?"#38bdf822":"#1e293b",
              border:"1px solid "+(viewBy===val?"#38bdf8":"#334155"),
              color:viewBy===val?"#38bdf8":"#64748b"}}>
              {label}
            </button>
          ))}
        </div>
        {/* Table */}
        <div style={{overflowY:"auto",flex:1}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead style={{position:"sticky",top:0,zIndex:1}}>
              <tr style={{background:"#1e293b"}}>
                <th style={{padding:"10px 14px",textAlign:"left",color:"#94a3b8",fontWeight:700,fontSize:11,textTransform:"uppercase",letterSpacing:"0.06em",borderBottom:"1px solid #334155",minWidth:200}}>
                  {viewBy === "practice" ? "Practice Area" : "Project"}
                </th>
                {onsiteVals.map(ov => (
                  <th key={ov} style={{padding:"10px 14px",textAlign:"center",color:"#38bdf8",fontWeight:700,fontSize:11,textTransform:"uppercase",letterSpacing:"0.06em",borderBottom:"1px solid #334155",minWidth:90}}>{ov}</th>
                ))}
                <th style={{padding:"10px 14px",textAlign:"center",color:"#f8fafc",fontWeight:700,fontSize:11,textTransform:"uppercase",letterSpacing:"0.06em",borderBottom:"1px solid #334155",minWidth:80}}>Total</th>
              </tr>
            </thead>
            <tbody>
              {rowGroups.map((group, i) => (
                <tr key={i} style={{background:i%2===0?"#0a1628":"#0f172a",borderBottom:"1px solid #1e293b"}}>
                  <td style={{padding:"9px 14px",color:"#cbd5e1",fontWeight:600}}>
                    {viewBy === "project" ? (
                      <div>
                        <div style={{color:"#f8fafc",fontSize:12,fontWeight:700}}>{group.name}</div>
                        {group.id && <div style={{color:"#475569",fontSize:10,marginTop:1}}>ID: {group.id}</div>}
                      </div>
                    ) : group.label}
                  </td>
                  {onsiteVals.map(ov => {
                    const subset = group.rows.filter(r => (r["Is Onsite"] || "Unknown") === ov);
                    return (
                      <td key={ov} style={{padding:"9px 14px",textAlign:"center"}}>
                        {subset.length > 0 ? (
                          <button onClick={()=>setAssocDialog({title:group.label+" — "+ov,associates:subset})}

                    <button onClick={()=>setAssocDialog({title:group.label+" — All",associates:group.rows})}
                      style={{background:"#f8fafc22",border:"1px solid #33415566",borderRadius:6,color:"#f8fafc",fontWeight:800,fontSize:12,cursor:"pointer",padding:"3px 12px",minWidth:36}}>

// ── Tenure Status Panel ───────────────────────────────────────────────────────
function TenureStatusPanel({baseData}) {
  const [drilldown, setDrilldown] = useState(null);
  const extra = lsExtraLoad();
  const exemptCats = lsExemptCatLoad();

  // Helper: FTE count per unique associate; uses real Total FTE if available, else headcount
  const fteSum=rows=>{
    const ids=new Set(rows.map(r=>String(r["Associate ID"]??"").trim()).filter(Boolean));
    return ids.size;
  };

  const exportToXLS = async (over12, allCats, rowData) => {
    const XLSX = await loadSheetJS();
    const plLeads = lsPortfolioLoad();
    const plMap = Object.fromEntries(plLeads.filter(l=>l.id).map(l=>[l.id, l.name ? l.name+" ("+l.id+")" : l.id]));
    const extraData = lsExtraLoad();

    // ── Sheet 1: Summary Matrix ───────────────────────────────────────────────
    const summaryRows = [];
    // Header row
    const headerRow = ["Billability","FTE Type", ...allCats, "No Category", "Total"];
    summaryRows.push(headerRow);
    // Data rows
    rowData.forEach(({bill, fteRows}) => {
      fteRows.forEach(({fte, subset}) => {
        const row = [bill, fte];
        allCats.forEach(cat => {
          row.push(fteSum(subset.filter(r => r["Exempted Category"] === cat)));
        });
        row.push(fteSum(subset.filter(r => !r["Exempted Category"])));
        row.push(fteSum(subset));
        summaryRows.push(row);
      });
    });
    // Total row
    const totalRow = ["TOTAL", ""];
    allCats.forEach(cat => {
      totalRow.push(fteSum(over12.filter(r => r["Exempted Category"] === cat)));
    });
    totalRow.push(fteSum(over12.filter(r => !r["Exempted Category"])));
    totalRow.push(fteSum(over12));
    summaryRows.push(totalRow);

    // ── Sheet 2: Associate Details ────────────────────────────────────────────
    const detailCols = ["Associate ID","Associate Name","Grade Name","Project Billability","FTE Type","Location Group Name","Is Onsite","Project Id","Project Name","Practice Area","Tenure","Portfolio Lead","Exempted Category","Exempted Till","Revised Tenure","Email Approval"];
    const detailRows = [detailCols];
    // Deduplicate by Associate ID for detail sheet
    const seen = new Set();
    over12.forEach(r => {
      const id = String(r["Associate ID"]??"").trim();
      if (!id || seen.has(id)) return;
      seen.add(id);
      const ex = extraData[id] || {};
      const plId = ex["Portfolio Lead"] || "";
      detailRows.push([
        id,
        r["Associate Name"] || "",
        r["Grade Name"] || "",
        r["Project Billability"] || "",
        r["FTE_CON"] || "",
        r["Location Group Name"] || "",
        r["Is Onsite"] || "",
        r["Project Id"] || "",
        r["Project Name"] || "",
        r["Practice Area"] || "",
        r["Tenure"] || "",
        plId ? (plMap[plId] || plId) : "",
        ex["Exempted Category"] || "",
        ex["Exempted Till"] || "",
        ex["Revised Tenure"] || "",
        ex["Email Approval"] || "",
      ]);
    });

    // ── Build workbook ────────────────────────────────────────────────────────
    const wb = XLSX.utils.book_new();
    const ws1 = XLSX.utils.aoa_to_sheet(summaryRows);
    const ws2 = XLSX.utils.aoa_to_sheet(detailRows);

    // Style header rows bold by setting column widths
    ws1["!cols"] = headerRow.map((h,i) => ({wch: i < 2 ? 16 : Math.max(String(h).length+2, 14)}));
    ws2["!cols"] = detailCols.map(h => ({wch: Math.max(String(h).length+2, 14)}));

    XLSX.utils.book_append_sheet(wb, ws1, "Tenure Status Summary");
    XLSX.utils.book_append_sheet(wb, ws2, "Associate Details");

    const today = new Date().toISOString().slice(0,10);
    XLSX.writeFile(wb, "TenureStatus_Over12Months_"+today+".xlsx");
  };

  // Merge extra into over-12 associates — exclude NBL billability
  const over12 = useMemo(() => {
    // FTE: tenure > 12 months (excluding NBL)
    const ftePart = baseData.filter(r =>
      r["FTE_CON"] !== "Cont" &&
      r.Tenure === "> 12 months" &&
      r["Project Billability"] !== "NBL"
    );
    // Cont: ALL under BTM or BFD regardless of tenure
    const contPart = baseData.filter(r =>
      r["FTE_CON"] === "Cont" &&
      (r["Project Billability"] === "BTM" || r["Project Billability"] === "BFD")
    );
    return [...ftePart, ...contPart].map(r => {
      const id = String(r["Associate ID"] ?? "").trim();
      const ex = extra[id] || {};
      return { ...r, "Exempted Category": ex["Exempted Category"] || "" };
    });
  }, [baseData, extra]);

  // Billability values (excluding NBL) and FTE_CON values
  const billabilities = [...new Set(over12.map(r => r["Project Billability"] || "Unknown"))].sort();
  const fteCons = [...new Set(over12.map(r => r["FTE_CON"] || "Unknown"))].sort();

  // All exemption categories
  const _acRaw=[...exemptCats,...over12.map(r=>r["Exempted Category"]).filter(Boolean)];const _acMap={};_acRaw.forEach(c=>{const k=c.toLowerCase();if(!_acMap[k])_acMap[k]=c;});allCats=Object.values(_acMap).sort();

  // Build row data: for each billability, compute per-FTE rows and also a merged subtotal
  const rowData = useMemo(() => {

      const fteRows = fteCons.map(fte => {
        const subset = billSubset.filter(r => (r["FTE_CON"]||"Unknown") === fte);
        return { fte, subset };
      }).filter(row => row.subset.length > 0);

  if (!over12.length) return (
    <div style={{background:"#1e293b",border:"1px solid #334155",borderRadius:12,padding:"24px",textAlign:"center",color:"#475569",fontSize:14}}>

  const btnStyle = (color) => ({background:color+"22",border:"1px solid "+color+"44",borderRadius:6,color:color,fontWeight:700,fontSize:12,cursor:"pointer",padding:"2px 10px",minWidth:32});

  return (
    <div style={{background:"#1e293b",border:"1px solid #334155",borderRadius:12,padding:"20px 22px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4,flexWrap:"wrap",gap:8}}>
        <div>
          <div style={{color:"#94a3b8",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em"}}>Tenure Status (FTE &gt; 12 months + All Cont BTM/BFD) | Count: {fteSum(over12)} | Rows: {over12.length}</div>
          <div style={{color:"#475569",fontSize:11,marginTop:4}}>Billability and FTE type shown as separate columns. NBL excluded. Click any count to drill down.</div>
        </div>
        <button onClick={()=>exportToXLS(over12,allCats,rowData)} style={{display:"flex",alignItems:"center",gap:6,padding:"7px 14px",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer",background:"#16a34a22",border:"1px solid #16a34a",color:"#4ade80",flexShrink:0}}>

            </tr>
          </thead>
          <tbody>
            {rowData.map(({bill, billSubset, fteRows}, bi) => {
              const rowSpan = fteRows.length;
              return fteRows.map((fteRow, fi) => {
                const {fte, subset} = fteRow;
                const rowBg = bi%2===0?"#0a1628":"#0f172a";

const HIDDEN_COLS=["Allocation Start Date"];
const VISIBLE_COLUMNS=ALL_COLUMNS.filter(c=>!HIDDEN_COLS.includes(c));
// ── Master Data storage helpers ─────────────────────────────────────────────
const DEFAULT_EXEMPT_CATS = ["Exempted","Work in Progress","Release / Release in progress","Short Contract","To be replaced","Exclude","NGTS"];
function lsExemptCatLoad(){
  try{
    const r=localStorage.getItem(LS_EXEMPTCAT_KEY);
    return r?JSON.parse(r):[...DEFAULT_EXEMPT_CATS];
  }catch{return[...DEFAULT_EXEMPT_CATS];}
}
function lsExemptCatSave(cats){
  try{localStorage.setItem(LS_EXEMPTCAT_KEY,JSON.stringify(cats));}catch{}
}
function lsPortfolioLoad(){
  try{
    const r=localStorage.getItem(LS_PORTFOLIO_KEY);
    return r?JSON.parse(r):[];
  }catch{return[];}
}
function lsPortfolioSave(leads){
  try{localStorage.setItem(LS_PORTFOLIO_KEY,JSON.stringify(leads));}catch{}
}

// Master data save/load uses spRESTSave/spRESTLoad (tenure_data.json)
function buildMasterPayload(overrides) {
  const cached = lsLoad();
  const rows = (cached && cached.rows) ? cached.rows : [];
  return {
    savedAt: new Date().toISOString(),
    rowCount: rows.length,
    rows,
    portfolioLeads: overrides.portfolioLeads !== undefined ? overrides.portfolioLeads : lsPortfolioLoad(),
    exemptCategories: overrides.exemptCategories !== undefined ? overrides.exemptCategories : lsExemptCatLoad()
  };
}
async function isOnSharePoint() {
  return window.location.hostname.includes("sharepoint.com");
}
async function trySavePayload(payload) {
  // 1. Power Automate — works from ANY URL, ANY browser. No admin needed.
  try { await paSave(payload); return "pa"; } catch(e) {
    if(e.message !== "POWER_AUTOMATE_URL not configured") console.warn("PA save:", e.message);
  }
  // 2. SharePoint REST — works when served from SharePoint URL
  try { await spRESTSave(payload); return "sp-rest"; } catch(e) {
    console.warn("SP REST:", e.message);
  }
  // 3. Graph API
  try { await graphUploadFile("tenure_data.json", payload); return "graph"; } catch(e) {}
  // 4. FSA local file
  try { await fsaSaveIfHandle(payload); return "fsa"; } catch(e) {
    if(e.message !== "NO_HANDLE") console.warn("FSA:", e.message);
  }
  throw new Error("not-configured");
}
async function savePortfolioToSP(leads) {
  lsPortfolioSave(leads);
  const payload = buildMasterPayload({ portfolioLeads: leads });
  return await trySavePayload(payload);
}
async function saveExemptCatsToSP(cats) {
  lsExemptCatSave(cats);
  const payload = buildMasterPayload({ exemptCategories: cats });
  return await trySavePayload(payload);
}
// ── File System Access API — writes directly to OneDrive folder on disk ──────
// The user picks tenure_data.json in their OneDrive TenureTrack folder once.
// Subsequent saves reuse the handle. OneDrive syncs the file to SharePoint.
let _fsaFileHandle = null; // persists for the browser session

async function fsaPickFile() {
  // Opens existing tenure_data.json — handle supports both read AND write
  if (!window.showOpenFilePicker) throw new Error("File System Access API not supported.");
  const [handle] = await window.showOpenFilePicker({
    types: [{ description: "JSON", accept: { "application/json": [".json"] } }],
    multiple: false
  });
  _fsaFileHandle = handle;
  return handle;
}
async function fsaReadHandle(handle) {
  const file = await handle.getFile();
  const text = await file.text();
  return JSON.parse(text);
}
async function fsaPickAndSave(payload) {
  if (!window.showOpenFilePicker) throw new Error("File System Access API not supported.");
  await fsaPickFile();
  await fsaWriteHandle(_fsaFileHandle, payload);
}
async function fsaWriteHandle(handle, payload) {
  const writable = await handle.createWritable();
  await writable.write(JSON.stringify(payload, null, 2));
  await writable.close();
}
async function fsaSaveIfHandle(payload) {
  if (!_fsaFileHandle) throw new Error("NO_HANDLE");
  await fsaWriteHandle(_fsaFileHandle, payload);
}
async function fsaLoadIfHandle() {
  if (!_fsaFileHandle) throw new Error("NO_HANDLE");
  return await fsaReadHandle(_fsaFileHandle);
}

async function loadPortfolioFromSP() {
  const data = await loadMasterData();
  if(data && data.portfolioLeads && data.portfolioLeads.length){
    lsPortfolioSave(data.portfolioLeads);
    return data.portfolioLeads;
  }
  return lsPortfolioLoad();
}
async function loadExemptCatsFromSP() {
  const data = await loadMasterData();
  if(data && data.exemptCategories && data.exemptCategories.length){
    lsExemptCatSave(data.exemptCategories);
    return data.exemptCategories;

function deriveRevisedTenure(exemptedTill,originalTenure){
  if(!exemptedTill)return originalTenure||"";
  const m=exemptedTill.match(/^(\d{1,2})\/(\d{2})$/);if(!m)return originalTenure||"";
  const month=parseInt(m[1],10)-1;const year=2000+parseInt(m[2],10);
  const exemptDate=new Date(year,month,1);const now=new Date();
  if(exemptDate>now)return"<8 months";
  const dm=(now.getFullYear()-exemptDate.getFullYear())*12+(now.getMonth()-exemptDate.getMonth());
  if(dm<8)return"<8 months";if(dm<10)return"8 to 10 months";if(dm<=12)return"10 to 12 months";return"> 12 months";
}
function isValidMMYY(val){
  if(!val||!val.trim()) return true; // blank is allowed
  return /^\d{1,2}\/\d{2}$/.test(val.trim()) &&
    parseInt(val.trim().split("/")[0],10)>=1 &&
    parseInt(val.trim().split("/")[0],10)<=12;
}
function formatExemptedTill(val){
  if(!val)return"";
  const v=String(val).trim();
  // YYYY-MM-DD or YYYY-MM -> M/YY
  const iso=v.match(/^(\d{4})-(\d{2})/);
  if(iso)return parseInt(iso[2],10)+"/"+iso[1].slice(2);
  // Already MM/YY or M/YY -> normalise (strip leading zero from month)
  const mmy=v.match(/^(\d{1,2})\/(\d{2})$/);
  if(mmy)return parseInt(mmy[1],10)+"/"+mmy[2];
  // Return as-is (text notes like "Intl Store support")
  return v;
}
function toMMYYStorageValue(raw){
  // When user types MM/YY directly, store as-is
  // When stored as YYYY-MM-DD, keep stored value but display as MM/YY
  return raw;
}

function PADiagnostic() {
  const [result, setResult] = React.useState(null);
  const [testing, setTesting] = React.useState(false);
  const storedUrl = localStorage.getItem("pa_load_url") || "https://defaultde08c40719b9427d9fe8edf254300c.a7.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/7d3eb909490e4aaf900096a0954fac71/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=kVKXZjxfs3PADrkgIz7gNazWTsKeWlaAbSzbyfgcdtY";
  const shortUrl = storedUrl ? storedUrl.slice(0,60)+"..." : "(not set)";
  async function runTest() {
    setTesting(true);
    setResult(null);
    try {
      if (!storedUrl) { setResult({ok:false, msg:"pa_load_url is empty in localStorage — URL not saved"}); return; }
      const res = await fetch(storedUrl, {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({action:"read"})});
      const text = await res.text();
      if (!res.ok) { setResult({ok:false, msg:"HTTP "+res.status+": "+text.slice(0,300)}); return; }
      setResult({ok:true, msg:"Success! Response: "+text.slice(0,200)});
    } catch(e) {
      setResult({ok:false, msg:"Fetch error: "+e.message});
    } finally { setTesting(false); }
  }
  return (
    <div style={{marginTop:12,padding:"10px 14px",background:"#0f172a",border:"1px solid #334155",borderRadius:8}}>
      <div style={{fontSize:11,color:"#64748b",marginBottom:6}}>🔧 Load Flow Diagnostics</div>
      <div style={{fontSize:11,color:"#94a3b8",marginBottom:8,wordBreak:"break-all"}}>
        Stored URL: <span style={{color: storedUrl?"#a78bfa":"#f87171"}}>{shortUrl}</span>
      </div>
      <button onClick={runTest} disabled={testing} style={{padding:"5px 12px",background:"#1e293b",border:"1px solid #475569",borderRadius:6,color:"#e2e8f0",fontSize:11,cursor:"pointer"}}>
        {testing ? "Testing..." : "▶ Test Load Flow Now"}
      </button>
      {result && (
        <div style={{marginTop:8,padding:"6px 10px",background: result.ok?"#14532d22":"#1c0a0a",border:`1px solid ${result.ok?"#16a34a44":"#7f1d1d55"}`,borderRadius:6,color:result.ok?"#4ade80":"#f87171",fontSize:11,fontFamily:"monospace",wordBreak:"break-all"}}>
          {result.ok?"[ok]":"❌"} {result.msg}
        </div>
      )}
    </div>
  );
}

    if(!file)return;

function GlobalAlert({alerts, onDismiss}) {
  if (!alerts || alerts.length === 0) return null;
  return (
    <div style={{position:"fixed",top:0,left:0,right:0,zIndex:9999,display:"flex",flexDirection:"column",gap:4,pointerEvents:"none"}}>
      {alerts.map(a => (
        <div key={a.id} style={{
          display:"flex",alignItems:"flex-start",gap:12,padding:"12px 20px",
          background: a.type==="error" ? "#7f1d1d" : a.type==="warning" ? "#78350f" : "#14532d",
          borderBottom: "2px solid "+(a.type==="error"?"#dc2626":a.type==="warning"?"#d97706":"#16a34a"),
          color:"#f8fafc",fontSize:13,pointerEvents:"all",
          boxShadow:"0 4px 20px rgba(0,0,0,0.5)"
        }}>
          <span style={{fontSize:18,lineHeight:1,flexShrink:0}}>
            {a.type==="error" ? "[!]" : a.type==="warning" ? "[!]" : "[ok]"}
          </span>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,marginBottom:2}}>{a.title}</div>
            <div style={{opacity:0.9,fontSize:12,lineHeight:1.5}}>{a.message}</div>
            {a.action && <div style={{marginTop:6,fontSize:11,opacity:0.75}}>[!] {a.action}</div>}
          </div>
          <button onClick={()=>onDismiss(a.id)} style={{
            background:"transparent",border:"none",color:"#f8fafc",
            fontSize:18,cursor:"pointer",lineHeight:1,opacity:0.7,flexShrink:0,
            padding:"0 4px"
          }}>x</button>
        </div>
      ))}
    </div>
  );
}

        {navItems.map(item=>(<button key={item.id} onClick={()=>setActiveNav(item.id)} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 10px",borderRadius:9,border:"none",cursor:"pointer",background:activeNav===item.id?"linear-gradient(90deg,#38bdf822,#a78bfa11)":"transparent",borderLeft:activeNav===item.id?"2px solid #38bdf8":"2px solid transparent",color:activeNav===item.id?"#f8fafc":"#475569",textAlign:"left",width:"100%",transition:"all 0.15s"}}><span style={{flexShrink:0,color:activeNav===item.id?"#38bdf8":"#475569"}}><Icon name={item.icon} size={16}/></span>{sidebarOpen&&<span style={{fontSize:13,fontWeight:600,whiteSpace:"nowrap"}}>{item.label}</span>}</button>))}
      </nav>
      {sidebarOpen&&(<div style={{padding:"12px 12px 20px",borderTop:"1px solid #1e293b"}}><div style={{fontSize:10,color:"#334155",textTransform:"uppercase",fontWeight:700,marginBottom:8}}>Data Status</div><div style={{display:"flex",flexDirection:"column",gap:5}}>{[["ESA",esaRaw.length],["Util",utilRaw.length],["Loaded",persistedBaseData.length]].map(([label,count])=>(<div key={label} style={{display:"flex",alignItems:"center",gap:7,fontSize:11}}><div style={{width:6,height:6,borderRadius:"50%",background:count?"#4ade80":"#334155"}}/><span style={{color:count?"#4ade80":"#475569"}}>{label} {count?`(${count})`:"not loaded"}</span></div>))}</div></div>)}
      <button onClick={()=>setSidebarOpen(o=>!o)} style={{margin:"0 8px 12px",padding:"8px",borderRadius:8,border:"1px solid #1e293b",background:"transparent",color:"#475569",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name={sidebarOpen?"chevron":"menu"} size={14}/></button>
    </div>
    <main style={{flex:1,overflowY:"auto",minWidth:0}}>
        
      <div style={{padding:"0 36px",height:56,display:"flex",alignItems:"center",borderBottom:"1px solid #1e293b",background:"#080f1f",position:"sticky",top:0,zIndex:10,gap:16}}>
        <div style={{flex:1}}><span style={{color:"#e2e8f0",fontWeight:700,fontSize:14}}>{activeNav==="upload"&&"Data Upload"}{activeNav==="dashboard"&&"Analytics Dashboard"}{activeNav==="data"&&"Base Data Explorer"}{activeNav==="admin"&&"Master Data - Admin"}</span></div>
        {baseData.length>0&&<div style={{padding:"4px 12px",borderRadius:20,background:"#14532d33",border:"1px solid #16a34a44",color:"#4ade80",fontSize:11,fontWeight:700}}>{baseData.length} associates loaded</div>}
        <div style={{color:"#334155",fontSize:12}}>{new Date().toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",year:"numeric"})}</div>
      </div>
      {activeNav==="upload"&&(<><UploadPanel esaData={esaRaw} utilData={utilRaw} utilLookup={utilLookup} onESAUpload={setEsaRaw} onUtilUpload={setUtilRaw} showAlert={showAlert}/><div style={{padding:"0 36px 36px"}}><SharePointSyncPanel baseData={baseData} onLoadFromSP={handleLoadFromSP} showAlert={showAlert}/></div></>)}
      {activeNav==="dashboard"&&<Dashboard baseData={baseData}/>}
      {activeNav==="data"&&<BaseDataTable baseData={baseData}/>}
      {activeNav==="admin"&&<AdminMasterData/>}
    </main>
  </div></>);}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
  </script>
</body>
</html>
